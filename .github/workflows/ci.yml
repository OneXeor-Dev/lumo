name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tools (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lumo-mobile in editable mode
        working-directory: tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-asyncio pytest-cov

      - name: Run pytest with coverage
        working-directory: tools
        run: |
          # Baseline floor is 65% — the core/ modules sit at 95–99% but
          # the thin CLI wrappers are exercised only by the e2e job, not
          # by pytest. Raise this number every time CLI coverage grows;
          # never lower it without a CHANGELOG note.
          pytest -q \
            --cov=lumo \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=65

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: tools/coverage.xml

      - name: Build sdist + wheel
        working-directory: tools
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Upload built wheel for the e2e job
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: lumo-mobile-wheel
          path: tools/dist/*.whl

  mypy:
    name: Python type check (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lumo-mobile and mypy
        working-directory: tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run mypy
        working-directory: tools
        run: mypy lumo

  e2e:
    name: End-to-end install (PyPI artefact)
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download the just-built wheel
        uses: actions/download-artifact@v4
        with:
          name: lumo-mobile-wheel
          path: dist

      - name: Install the wheel into a fresh venv (simulates pipx)
        run: |
          python -m venv /tmp/e2e-venv
          /tmp/e2e-venv/bin/pip install dist/*.whl

      - name: All eight console scripts exist
        run: |
          test -x /tmp/e2e-venv/bin/lumo-wcag
          test -x /tmp/e2e-venv/bin/lumo-theory
          test -x /tmp/e2e-venv/bin/lumo-parity
          test -x /tmp/e2e-venv/bin/lumo-source
          test -x /tmp/e2e-venv/bin/lumo-audit
          test -x /tmp/e2e-venv/bin/lumo-figma
          test -x /tmp/e2e-venv/bin/lumo-render
          test -x /tmp/e2e-venv/bin/lumo-mcp

      - name: lumo-wcag check exits non-zero on a known-fail pair
        run: |
          if /tmp/e2e-venv/bin/lumo-wcag check --fg "#3B82F6" --bg "#FFFFFF"; then
            echo "expected non-zero exit, got 0" && exit 1
          fi

      - name: lumo-wcag fix exits 0 and produces a corrected hex
        run: |
          out="$(/tmp/e2e-venv/bin/lumo-wcag fix --fg '#7DD3FC' --bg '#FFFFFF')"
          echo "$out"
          echo "$out" | grep -q 'FIXED'

      - name: lumo-theory check on a known-bad layout produces findings
        run: |
          if /tmp/e2e-venv/bin/lumo-theory check --layout examples/theory_bad_layout.json; then
            echo "expected non-zero exit (findings present), got 0" && exit 1
          fi

      - name: lumo-theory check on a known-good layout exits 0
        run: |
          /tmp/e2e-venv/bin/lumo-theory check --layout examples/theory_good_layout.json

      - name: lumo-parity diff finds the 16dp vs 48pt junior bug
        run: |
          out="$(/tmp/e2e-venv/bin/lumo-parity diff \
            --android examples/parity_android.json \
            --ios     examples/parity_ios.json \
            --config  examples/lumo.config.json || true)"
          echo "$out"
          echo "$out" | grep -q 'height_mismatch'

      - name: lumo-source flags every plant in the Compose anchor
        run: |
          out="$(/tmp/e2e-venv/bin/lumo-source check --file examples/source_bad_compose.kt || true)"
          echo "$out"
          # Anchor file has exactly one of each — Material 48dp violation,
          # hex colour, and off-scale radius. Theme references must NOT
          # be flagged.
          echo "$out" | grep -q 'undersized_tap_target'
          echo "$out" | grep -q 'hardcoded_color'
          echo "$out" | grep -q 'off_scale_radius'
          ! echo "$out" | grep -q 'MaterialTheme.colorScheme.primary'

      - name: lumo-source flags every plant in the SwiftUI anchor
        run: |
          # Use JSON output so we assert on findings, not on the prose
          # recommendation (which mentions `Color("brandPrimary")` as an
          # example of what the user SHOULD use — we don't want that to
          # trip our "must not flag asset-catalog colours" assertion).
          /tmp/e2e-venv/bin/lumo-source check --file examples/source_bad_swiftui.swift --json > /tmp/swiftui-findings.json || true
          cat /tmp/swiftui-findings.json
          # Anchor file has exactly one of each finding.
          /tmp/e2e-venv/bin/python - <<'PYEOF'
          import json
          d = json.load(open("/tmp/swiftui-findings.json"))
          checks = {f["check"] for f in d["findings"]}
          assert "undersized_tap_target" in checks, checks
          assert "hardcoded_color" in checks, checks
          assert "off_scale_radius" in checks, checks
          # Asset-catalog (`Color("brandPrimary")`) and named-constant
          # (`Color.red`) colours must NOT trip a finding — verify by
          # walking snippets, not prose. Snippets are short.
          snippets = [f.get("snippet", "") for f in d["findings"]]
          assert all("brandPrimary" not in s for s in snippets), snippets
          assert all("Color.red" not in s for s in snippets), snippets
          PYEOF

      - name: lumo-audit aggregates across the examples/ tree
        run: |
          out="$(/tmp/e2e-venv/bin/lumo-audit scan --root examples || true)"
          echo "$out"
          # examples/ contains source_bad_compose.kt + source_bad_swiftui.swift —
          # both have one finding per category. The aggregate must show
          # both undersized findings (count of 2) and the off-scale radius
          # entries that anchor files plant.
          echo "$out" | grep -q 'Files scanned'
          echo "$out" | grep -q '`undersized_tap_target`: 2'
          echo "$out" | grep -q 'Measured scale'
          echo "$out" | grep -q 'Off-scale values:'

      - name: lumo-render compose produces ast-resolved coordinates
        run: |
          # Render the Compose anchor with a known screen size; the
          # output must contain at least one ast-resolved element with
          # finite x/y. This is the integration test for the AST
          # evaluator from the wheel (not just the pure-Python tests).
          /tmp/e2e-venv/bin/lumo-render compose \
            --file examples/source_bad_compose.kt \
            --screen-width 411 --screen-height 891 \
            --json > /tmp/render-compose.json || true
          cat /tmp/render-compose.json
          /tmp/e2e-venv/bin/python - <<'PYEOF'
          import json
          d = json.load(open("/tmp/render-compose.json"))
          assert d["screen"]["unit"] == "dp"
          assert any(e.get("source") == "ast-resolved" for e in d["elements"]), d
          PYEOF

      - name: lumo-render swiftui produces ast-resolved coordinates
        run: |
          /tmp/e2e-venv/bin/lumo-render swiftui \
            --file examples/source_bad_swiftui.swift \
            --screen-width 411 --screen-height 891 \
            --json > /tmp/render-swiftui.json || true
          cat /tmp/render-swiftui.json
          /tmp/e2e-venv/bin/python - <<'PYEOF'
          import json
          d = json.load(open("/tmp/render-swiftui.json"))
          assert d["screen"]["unit"] == "pt"
          # SwiftUI anchor file may resolve nothing if its content uses
          # only token references; either way, must not crash and must
          # emit a valid schema.
          assert "elements" in d
          assert "coverage" in d
          PYEOF

      - name: lumo-figma reports a clear auth error when FIGMA_TOKEN is unset
        run: |
          # CI doesn't have a Figma token; running the CLI must produce
          # a human-readable error and exit non-zero, not crash. This
          # also confirms the binary is wired up and the args are parsed.
          unset FIGMA_TOKEN
          if /tmp/e2e-venv/bin/lumo-figma diff --file-key dummy --root examples; then
            echo "expected non-zero exit, got 0" && exit 1
          fi
          out="$(/tmp/e2e-venv/bin/lumo-figma diff --file-key dummy --root examples 2>&1 || true)"
          echo "$out" | grep -q 'FIGMA_TOKEN'

  installer:
    name: Node installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install installer deps
        working-directory: installer
        run: npm install --no-audit --no-fund

      - name: Smoke test the CLI
        working-directory: installer
        run: |
          node src/index.js --help
          node src/index.js --version

      - name: Verify pack contents
        working-directory: installer
        run: npm pack --dry-run

  skill:
    name: Skill manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest JSON
        run: |
          python3 -c "import json; json.load(open('skills.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Validate CITATION.cff (YAML)
        run: |
          python3 -m pip install --quiet pyyaml
          python3 -c "import yaml; yaml.safe_load(open('CITATION.cff'))"

      - name: Verify SKILL.md frontmatter present
        run: |
          head -1 skill/SKILL.md | grep -q '^---$'
          grep -q '^name: lumo' skill/SKILL.md
          grep -q '^description:' skill/SKILL.md
