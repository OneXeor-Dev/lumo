name: Bug report
description: Something in Lumo is broken or wrong.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the
        fields below so we can reproduce and fix.

  - type: input
    id: versions
    attributes:
      label: Versions
      description: Output of `lumo --version` and `pip show lumo-mobile | head -2`.
      placeholder: "lumo 0.0.2 / lumo-mobile 0.0.1"
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Which tool is affected?
      multiple: false
      options:
        - lumo-wcag
        - lumo-theory
        - lumo-parity
        - lumo-mcp
        - lumo (installer)
        - other / unsure
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Mobile platform you're targeting
      multiple: true
      options:
        - Jetpack Compose
        - Android XML
        - SwiftUI
        - UIKit
        - not relevant
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command you ran
      description: Paste the exact CLI invocation, or the MCP tool call.
      render: bash
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input (layout JSON, colour pair, etc.)
      description: |
        Minimum input that reproduces the bug. For WCAG bugs include the
        W3C-formula expected value if you have one.
      render: json
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: What you got
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: OS, terminal, Python version, Node version, screenshots…
    validations:
      required: false
